version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tcg_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - tcg_network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=${APP_ENV:-local}

  nginx:
    image: nginx:alpine
    container_name: tcg_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - tcg_network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: tcg_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: tcg_manager
      MYSQL_USER: tcg_user
      MYSQL_PASSWORD: tcg_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - tcg_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tcg_network
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: tcg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - tcg_redis_data:/data
    networks:
      - tcg_network
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  mailpit:
    image: axllent/mailpit:latest
    container_name: tcg_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tcg_network

networks:
  tcg_network:
    driver: bridge

volumes:
  tcg_mysql_data:
    driver: local
  tcg_redis_data:
    driver: local
